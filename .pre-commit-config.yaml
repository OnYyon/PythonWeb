repos:
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: env DB_NAME=cinema DB_USER=cinema DB_PASSWORD=P@ssw0rd DB_HOST=localhost DB_PORT=5432 mypy
        language: python
        types: [python]
        args:
          [
            --show-error-codes,
            --pretty,
            --ignore-missing-imports,
            --check-untyped-defs,
          ]
        additional_dependencies:
          - mypy==1.18.1
          - django
          - django-stubs
          - django-split-settings
          - psycopg[binary]
          - djangorestframework
          - djangorestframework-stubs

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
