services:
  db:
    image: postgres:16-alpine
    container_name: cinema_db
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: P@ssw0rd # not for prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/payment/infrastructure/sql/schema.sql:/docker-entrypoint-initdb.d/payment-001.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    command: >
      sh -c "
      uv run src/cinema_platform_django/manage.py migrate &&
      uv run src/cinema_platform_django/manage.py runserver 0.0.0.0:8000
      "
    environment:
      DJANGO_SETTINGS_MODULE: src.cinema_platform_django.config.settings
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cinema
      DB_USER: cinema
      DB_PASSWORD: P@ssw0rd
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  payment:
    build: .
    command: >
      uv run python -m uvicorn src.payment.main:app
      --host 0.0.0.0 --port 8001
    environment:
      PAYMENT_DATABASE_DSN: postgresql://cinema:P%40ssw0rd@db:5432/cinema
      PAYMENT_DB_POOL_MIN: 1
      PAYMENT_DB_POOL_MAX: 10
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8001"

  nginx:
    image: nginx:alpine
    container_name: cinema_gateway
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django
      - payment

volumes:
  postgres_data:
