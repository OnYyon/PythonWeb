services:
  db:
    image: postgres:16-alpine
    container_name: cinema_db
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: P@ssw0rd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema"]
      interval: 10s
      timeout: 5s
      retries: 5

  django_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_app
    expose:
      - "8000"

    command: ["python", "src/cinema_platform_django/manage.py", "runserver", "0.0.0.0:8000"]
    depends_on:
      db:
        condition: service_healthy

  recommendation_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_app
    expose:
      - "5001"
    command: ["python", "src/recommendation_service/run.py", "5001"]
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django_service
      - recommendation_service

volumes:
  postgres_data:
