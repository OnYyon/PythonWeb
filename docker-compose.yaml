services:
  db:
    image: postgres:16-alpine
    container_name: cinema_db
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: P@ssw0rd # not for prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
