services:
  db:
    image: postgres:16-alpine
    container_name: cinema_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/payment/infrastructure/sql/schema.sql:/docker-entrypoint-initdb.d/payment-001.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  django_service:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: src.cinema_platform_django.config.settings
      PYTHONPATH: /app:/app/src/cinema_platform_django
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cinema
      DB_USER: cinema
      DB_PASSWORD: P@ssw0rd
    command:
      [
        "gunicorn",
        "src.cinema_platform_django.config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "4",
        "--worker-class",
        "gthread",
        "--threads",
        "4",
        "--log-file",
        "-",
      ]
    depends_on:
      db:
        condition: service_healthy

  recommendation_service:
    build: .
    ports:
      - "5001:5001"
    command:
      [
        "gunicorn",
        "src.recommendation_service.app:create_app()",
        "--bind",
        "0.0.0.0:5001",
        "--workers",
        "4",
        "--worker-class",
        "gthread",
        "--threads",
        "4",
        "--log-file",
        "-",
      ]
    depends_on:
      db:
        condition: service_healthy

  payment_service:
    build: .
    ports:
      - "5002:5002"
    environment:
      PAYMENT_DATABASE_DSN: postgresql://cinema:P%40ssw0rd@db:5432/cinema
      PAYMENT_DB_POOL_MIN: 1
      PAYMENT_DB_POOL_MAX: 10
    command:
      [
        "uvicorn",
        "src.payment.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "5002",
        "--workers",
        "4",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
      ]
    depends_on:
      db:
        condition: service_healthy

  auth_service:
    build: .
    ports:
      - "5003:5003"
    environment:
      DJANGO_SETTINGS_MODULE: src.cinema_platform_django.config.settings
      PYTHONPATH: /app:/app/src/cinema_platform_django
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cinema
      DB_USER: cinema
      DB_PASSWORD: P@ssw0rd
    command:
      [
        "uvicorn",
        "src.auth_service.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "5003",
        "--workers",
        "4",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
      ]
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django_service
      - recommendation_service
      - payment_service
      - auth_service

volumes:
  postgres_data:
