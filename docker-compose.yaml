services:
  db:
    image: postgres:16-alpine
    container_name: cinema_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/payment/infrastructure/sql/schema.sql:/docker-entrypoint-initdb.d/payment-001.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d cinema"]
      interval: 10s
      timeout: 5s
      retries: 5

  django_service:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: src.cinema_platform_django.config.settings
      PYTHONPATH: /app:/app/src/cinema_platform_django
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM}
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    command:
      [
        "gunicorn",
        "src.cinema_platform_django.config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "4",
        "--worker-class",
        "gthread",
        "--threads",
        "4",
        "--log-file",
        "-",
      ]
    depends_on:
      db:
        condition: service_healthy

  recommendation_service:
    build: .
    environment:
      PYTHONPATH: /app
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM}
    command:
      [
        "gunicorn",
        "src.recommendation_service.app:create_app()",
        "--bind",
        "0.0.0.0:5001",
        "--workers",
        "4",
        "--worker-class",
        "gthread",
        "--threads",
        "4",
        "--log-file",
        "-",
      ]
    depends_on:
      db:
        condition: service_healthy

  payment_service:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PAYMENT_DB_POOL_MIN: 1
      PAYMENT_DB_POOL_MAX: 10
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM}
    command:
      [
        "uvicorn",
        "src.payment.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "5002",
        "--workers",
        "4",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
      ]
    depends_on:
      db:
        condition: service_healthy

  auth_service:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: src.cinema_platform_django.config.settings
      PYTHONPATH: /app:/app/src/cinema_platform_django
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM}
    command:
      [
        "uvicorn",
        "src.auth_service.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "5003",
        "--workers",
        "4",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
      ]
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro
    depends_on:
      - django_service
      - recommendation_service
      - payment_service
      - auth_service

volumes:
  postgres_data:
  static_data:
  media_data:
