events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    upstream django_backend { server django_service:8000; }
    upstream recommendation_backend { server recommendation_service:5001; }
    upstream payment_backend { server payment_service:5002; }
    upstream auth_backend { server auth_service:5003; }

    server {
        listen 80;

        location /api/v1/recommendations {
            proxy_pass http://recommendation_backend;
        }

        location /api/v1/auth/ {
            proxy_pass http://auth_backend;
        }

        location /api/v1/cards {
            proxy_pass http://payment_backend;
        }

        location /api/v1/payments {
            proxy_pass http://payment_backend;
        }

        location /admin/ {
            proxy_pass http://django_backend;
        }

        location /static/ {
            alias /app/static/;
        }

        location /media/ {
            alias /app/media/;
        }

        location / {
            proxy_pass http://django_backend;
        }
    }
}
